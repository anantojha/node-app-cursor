<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing in…</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1 id="status">Signing in…</h1>
        <p class="subtitle">Completing authentication with your provider.</p>
        <div id="message" class="message info">Please wait.</div>
        <p class="footer hidden" id="retry-link">
          <a href="/login">Return to sign in</a>
        </p>
      </div>
    </div>
    <script type="module" src="/js/callback.js"></script>
  </body>
</html>
